name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Go tip
        run: |
          go install golang.org/dl/gotip@latest
          gotip download
      
      - name: Run vet
        env:
          GOTOOLCHAIN: local
        run: gotip vet ./...
      
      - name: Run tests
        env:
          GOTOOLCHAIN: local
        run: gotip test -v -race -coverprofile=coverage.out ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test]
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Go tip
        run: |
          go install golang.org/dl/gotip@latest
          gotip download
      
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOTOOLCHAIN: local
        run: |
          gotip build -ldflags="-s -w" -o yggchat-${{ matrix.goos }}-${{ matrix.goarch }}
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: yggchat-${{ matrix.goos }}-${{ matrix.goarch }}
          path: yggchat-*

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        run: docker build -t yggchat:test .

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
